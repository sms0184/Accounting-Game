# nginx config for the live server
# location on server: /etc/nginx/sites-available/AccountingGame
# to apply changes: sudo nginx -t && sudo systemctl reload nginx
# DO NOT overwrite this file on the server without testing first
# after any changes, always run: sudo nginx -t before reloading

server {
    listen 80;
    listen [::]:80;
    server_name accounting-game.cse.eng.auburn.edu www.accounting-game.cse.eng.auburn.edu;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name accounting-game.cse.eng.auburn.edu www.accounting-game.cse.eng.auburn.edu;

    ssl_certificate /etc/certificate/accounting-game_cse_eng_auburn_edu_cert.crt;
    ssl_certificate_key /etc/certificate/accounting-game.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/AccountingGame;
    index index.html;

    # DON'T CACHE index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Serve files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Passing API requests to FastAPI backend on port 8000
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Passing SAML requests to FastAPI backend
    location /saml/ {
        proxy_pass http://127.0.0.1:8000/saml/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastAPI docs
    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: better caching for assets
    location ~* \.(?:js|mjs|css|svg|png|jpg|jpeg|gif|webp|ico)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}